name: Deploy Application

on:
workflow_dispatch:

permissions:
id-token: write
contents: read

env:
AWS_REGION: ap-south-1

jobs:

deploy:
runs-on: ubuntu-latest

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ap-south-1

  - name: Login to ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Get Terraform Outputs
    id: tf

    working-directory: terraform

    run: |
      terraform init

      echo "backend_ecr=$(terraform output -raw backend_ecr_url)" >> $GITHUB_OUTPUT
      echo "frontend_ecr=$(terraform output -raw frontend_ecr_url)" >> $GITHUB_OUTPUT
      echo "instance_id=$(terraform output -raw ec2_instance_id)" >> $GITHUB_OUTPUT
      echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
      echo "db_name=$(terraform output -raw db_name)" >> $GITHUB_OUTPUT
      echo "db_user=$(terraform output -raw db_username)" >> $GITHUB_OUTPUT
      echo "db_password=$(terraform output -raw db_password)" >> $GITHUB_OUTPUT

  - name: Build Backend Image
    run: |
      docker build \
      -t ${{ steps.tf.outputs.backend_ecr }}:latest \
      ./backend

  - name: Push Backend Image
    run: |
      docker push \
      ${{ steps.tf.outputs.backend_ecr }}:latest

  - name: Build Frontend Image
    run: |
      docker build \
      -t ${{ steps.tf.outputs.frontend_ecr }}:latest \
      ./frontend

  - name: Push Frontend Image
    run: |
      docker push \
      ${{ steps.tf.outputs.frontend_ecr }}:latest

  - name: Prepare Compose File
    run: |
      cp docker/docker-compose.ec2.yml docker-compose.yml

      sed -i "s|\${DB_HOST}|${{ steps.tf.outputs.rds_endpoint }}|g" docker-compose.yml
      sed -i "s|\${DB_USER}|${{ steps.tf.outputs.db_user }}|g" docker-compose.yml
      sed -i "s|\${DB_PASSWORD}|${{ steps.tf.outputs.db_password }}|g" docker-compose.yml
      sed -i "s|\${DB_NAME}|${{ steps.tf.outputs.db_name }}|g" docker-compose.yml

  - name: Deploy Using SSM
    run: |
      COMPOSE=$(base64 -w 0 docker-compose.yml)

      aws ssm send-command \
      --instance-ids "${{ steps.tf.outputs.instance_id }}" \
      --document-name "AWS-RunShellScript" \
      --parameters "commands=[
      'mkdir -p /home/ubuntu/student-app',
      'echo $COMPOSE | base64 -d > /home/ubuntu/student-app/docker-compose.yml',
      'cd /home/ubuntu/student-app',
      'aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 500782030335.dkr.ecr.ap-south-1.amazonaws.com',
      'docker compose pull',
      'docker compose down || true',
      'docker compose up -d'
      ]"
