services:

  mysql:
    image: mysql:8.0
    container_name: student_mysql

    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: student_registration

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    restart: unless-stopped

    networks:
      - student_network

  backend:
    image: 500782030335.dkr.ecr.ap-south-1.amazonaws.com/student-backend
    container_name: student_backend

    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: student_registration
      PORT: 5000
      NODE_ENV: production

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    restart: unless-stopped

    networks:
      - student_network

  frontend:
    image: 500782030335.dkr.ecr.ap-south-1.amazonaws.com/student-frontend
    container_name: student_frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - student_network

volumes:
  mysql_data:

networks:
  student_network: